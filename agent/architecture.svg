<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 620" role="img" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <title>Compagnon agent architecture</title>
  <desc>A ReAct single-agent flow: a fridge scan feeds a recipe engine and a replenishment agent, each gated by guardrails, with an MCP producer server as the external source.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- title band -->
  <text x="40" y="34" font-size="17" font-weight="600" fill="#1B3A2F">Compagnon — ReAct single-agent architecture</text>
  <text x="40" y="54" font-size="12.5" fill="#6B6B63">On-device perception · cloud reasoning · guarded action · MCP producer source</text>

  <!-- ON DEVICE container -->
  <rect x="40" y="76" width="600" height="92" rx="14" fill="#EEF3EE" stroke="#2E7D5B" stroke-width="0.5"/>
  <text x="58" y="98" font-size="12" font-weight="600" fill="#2E7D5B">ON DEVICE (phone)</text>
  <rect x="58" y="108" width="170" height="46" rx="8" fill="#FFFFFF" stroke="#7FB069" stroke-width="0.5"/>
  <text x="143" y="130" font-size="13.5" font-weight="600" fill="#1B3A2F" text-anchor="middle">Fridge scan</text>
  <text x="143" y="146" font-size="11.5" fill="#6B6B63" text-anchor="middle">vision · shelf life</text>
  <rect x="245" y="108" width="170" height="46" rx="8" fill="#FFFFFF" stroke="#7FB069" stroke-width="0.5"/>
  <text x="330" y="130" font-size="13.5" font-weight="600" fill="#1B3A2F" text-anchor="middle">Inventory + diet</text>
  <text x="330" y="146" font-size="11.5" fill="#6B6B63" text-anchor="middle">structured items</text>
  <rect x="432" y="108" width="190" height="46" rx="8" fill="#FFFFFF" stroke="#7FB069" stroke-width="0.5"/>
  <text x="527" y="130" font-size="13.5" font-weight="600" fill="#1B3A2F" text-anchor="middle">Carbon grade</text>
  <text x="527" y="146" font-size="11.5" fill="#6B6B63" text-anchor="middle">weekly A–F</text>

  <!-- arrow device -> reasoning -->
  <line x1="340" y1="168" x2="340" y2="196" stroke="#6B6B63" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- REASONING container -->
  <rect x="40" y="198" width="600" height="150" rx="14" fill="#F6F4EC" stroke="#1B3A2F" stroke-width="0.5"/>
  <text x="58" y="220" font-size="12" font-weight="600" fill="#1B3A2F">CLOUD REASONING — the agent (claude-sonnet-4-6)</text>

  <!-- recipe engine node -->
  <rect x="58" y="234" width="270" height="96" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="193" y="256" font-size="13.5" font-weight="600" fill="#854F0B" text-anchor="middle">Recipe engine</text>
  <text x="193" y="274" font-size="11.5" fill="#854F0B" text-anchor="middle">model call → anti-waste recipe</text>
  <text x="193" y="296" font-size="11" fill="#633806" text-anchor="middle">guardrails: schema · dietary</text>
  <text x="193" y="312" font-size="11" fill="#633806" text-anchor="middle">filter · ingredient grounding</text>

  <!-- replenishment agent node -->
  <rect x="352" y="234" width="270" height="96" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="487" y="256" font-size="13.5" font-weight="600" fill="#0F6E56" text-anchor="middle">Replenishment agent</text>
  <text x="487" y="274" font-size="11.5" fill="#0F6E56" text-anchor="middle">judgement: which basket</text>
  <text x="487" y="296" font-size="11" fill="#085041" text-anchor="middle">guardrails: spend cap · kill</text>
  <text x="487" y="312" font-size="11" fill="#085041" text-anchor="middle">switch · auto-approve · audit</text>

  <!-- arrow reasoning -> MCP -->
  <line x1="487" y1="348" x2="487" y2="392" stroke="#6B6B63" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="374" font-size="11.5" fill="#6B6B63">basket_for()</text>

  <!-- MCP server -->
  <rect x="352" y="394" width="270" height="78" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="487" y="418" font-size="12" font-weight="600" fill="#3C3489" text-anchor="middle">MCP SERVER (FastMCP)</text>
  <text x="487" y="438" font-size="13.5" font-weight="600" fill="#26215C" text-anchor="middle">producer lookup</text>
  <text x="487" y="456" font-size="11.5" fill="#534AB7" text-anchor="middle">read-only · local producers ≤15 km</text>

  <!-- outputs from recipe -->
  <line x1="193" y1="330" x2="193" y2="510" stroke="#6B6B63" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- terminal outputs container -->
  <rect x="40" y="512" width="600" height="86" rx="14" fill="#F6F4EC" stroke="#6B6B63" stroke-width="0.5"/>
  <text x="58" y="534" font-size="12" font-weight="600" fill="#1B3A2F">TERMINAL OUTPUTS (structured + audited)</text>
  <rect x="58" y="544" width="270" height="42" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="193" y="569" font-size="12.5" font-weight="600" fill="#1B3A2F" text-anchor="middle">Validated recipe (JSON)</text>
  <rect x="352" y="544" width="270" height="42" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="487" y="563" font-size="12.5" font-weight="600" fill="#1B3A2F" text-anchor="middle">Order: placed / escalated /</text>
  <text x="487" y="579" font-size="12.5" font-weight="600" fill="#1B3A2F" text-anchor="middle">blocked + audit line</text>

  <!-- arrow MCP -> order output -->
  <line x1="487" y1="472" x2="487" y2="544" stroke="#6B6B63" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
